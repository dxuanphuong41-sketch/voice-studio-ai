name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-tts.txt
            requirements-desktop.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-desktop.txt

      - name: Build Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          python -m PyInstaller
          --noconfirm --clean --onefile --windowed
          --name VoiceStudioAI
          --collect-all imageio_ffmpeg
          --collect-submodules google.genai
          desktop_launcher.py

      - name: Test Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dist\VoiceStudioAI.exe --smoke-test

      - name: Package Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -LiteralPath .\dist\VoiceStudioAI.exe -DestinationPath .\VoiceStudioAI-Windows.zip

      - name: Build macOS application
        if: runner.os == 'macOS'
        run: >-
          python -m PyInstaller
          --noconfirm --clean --onedir --windowed
          --name VoiceStudioAI
          --collect-all imageio_ffmpeg
          --collect-submodules google.genai
          desktop_launcher.py

      - name: Test macOS application
        if: runner.os == 'macOS'
        run: ./dist/VoiceStudioAI.app/Contents/MacOS/VoiceStudioAI --smoke-test

      - name: Package macOS application
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/VoiceStudioAI.app VoiceStudioAI-macOS.zip

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: VoiceStudioAI-Windows
          path: VoiceStudioAI-Windows.zip
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: VoiceStudioAI-macOS
          path: VoiceStudioAI-macOS.zip
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: VoiceStudioAI-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          VoiceStudioAI-Windows.zip VoiceStudioAI-macOS.zip
          --repo "${GITHUB_REPOSITORY}"
          --title "Voice Studio AI ${GITHUB_REF_NAME}"
          --generate-notes
