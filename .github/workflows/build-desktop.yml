name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact: VoiceStudioAI-Windows
            archive: VoiceStudioAI-Windows.zip
          - os: macos-latest
            platform: macos
            artifact: VoiceStudioAI-macOS-Apple-Silicon
            archive: VoiceStudioAI-macOS-Apple-Silicon.zip
          - os: macos-15-intel
            platform: macos
            artifact: VoiceStudioAI-macOS-Intel
            archive: VoiceStudioAI-macOS-Intel.zip
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-tts.txt
            requirements-desktop.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-desktop.txt

      - name: Test console-free server startup
        run: python tests/test_desktop_launcher.py

      - name: Build Windows executable
        if: matrix.platform == 'windows'
        shell: pwsh
        run: >-
          python -m PyInstaller
          --noconfirm --clean --onefile --windowed
          --name VoiceStudioAI
          --collect-all imageio_ffmpeg
          --collect-submodules google.genai
          desktop_launcher.py

      - name: Test Windows executable
        if: matrix.platform == 'windows'
        shell: pwsh
        run: .\dist\VoiceStudioAI.exe --smoke-test

      - name: Package Windows executable
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -LiteralPath .\dist\VoiceStudioAI.exe -DestinationPath .\VoiceStudioAI-Windows.zip

      - name: Build macOS application
        if: matrix.platform == 'macos'
        run: >-
          python -m PyInstaller
          --noconfirm --clean --onedir --windowed
          --name VoiceStudioAI
          --collect-all imageio_ffmpeg
          --collect-submodules google.genai
          desktop_launcher.py

      - name: Test macOS application
        if: matrix.platform == 'macos'
        run: ./dist/VoiceStudioAI.app/Contents/MacOS/VoiceStudioAI --smoke-test

      - name: Package macOS application
        if: matrix.platform == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent dist/VoiceStudioAI.app "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: VoiceStudioAI-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          VoiceStudioAI-Windows.zip
          VoiceStudioAI-macOS-Apple-Silicon.zip
          VoiceStudioAI-macOS-Intel.zip
          --repo "${GITHUB_REPOSITORY}"
          --title "Voice Studio AI ${GITHUB_REF_NAME}"
          --generate-notes
